<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'课程主页 - ' + ${course.courseName}">课程主页</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main, #f5f0e6);
            color: var(--text-main, #1a1a1a);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .page-layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 250px;
            background-color: var(--bg-header, #264639);
            color: #f5f0e6;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border-color, #121212);
        }
        .sidebar-header {
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border-bottom: 2px solid var(--border-color, #121212);
            text-align: center;
        }
        .nav-menus {
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex: 1;
        }
        .nav-item {
            color: #e0e6e3;
            text-decoration: none;
            font-size: 16px;
            padding: 15px 20px;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .nav-item:hover { background-color: rgba(255,255,255,0.1); }
        .nav-item.active {
            background-color: var(--bg-main, #f5f0e6);
            color: var(--text-main, #1a1a1a);
            border-left: 4px solid var(--accent-yellow, #d89632);
            font-weight: bold;
        }
        .sidebar-footer {
            padding: 20px;
            border-top: 2px solid var(--border-color, #121212);
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: center;
        }
        .login-btn {
            background-color: var(--bg-card, #ffffff);
            color: var(--text-main, #1a1a1a);
            border: 2px solid var(--border-color, #121212);
            padding: 8px 16px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 3px 3px 0 var(--border-color, #121212);
        }
        .content-area { flex: 1; display: flex; flex-direction: column; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: var(--bg-main, #f5f0e6);
            border-bottom: 2px solid var(--border-color, #121212);
        }
        .page-title { font-size: 28px; font-weight: bold; margin: 0; }
        .action-link {
            background-color: var(--bg-card, #ffffff);
            color: var(--text-main, #1a1a1a);
            border: 2px solid var(--border-color, #121212);
            padding: 8px 16px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 3px 3px 0 var(--border-color, #121212);
        }
        .course-tabs {
            display: flex;
            gap: 12px;
            padding: 16px 40px 0;
            flex-wrap: wrap;
        }
        .tab-item {
            text-decoration: none;
            color: var(--text-main, #1a1a1a);
            border: 2px solid var(--border-color, #121212);
            padding: 8px 14px;
            background: var(--bg-card, #ffffff);
            box-shadow: 3px 3px 0 var(--border-color, #121212);
            font-weight: bold;
        }
        .tab-item.active {
            background: var(--bg-header, #264639);
            color: #f5f0e6;
        }
        .main-content { padding: 24px 40px 40px; max-width: 1200px; }
        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-color, #121212);
        }
        .task-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .task-card {
            background: #fff;
            border-radius: 0;
            border: 2px solid #1a1a1a;
            box-shadow: 5px 5px 0px #1a1a1a;
            padding: 20px;
            width: calc(33.333% - 14px);
            box-sizing: border-box;
        }
        .task-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        .task-badge {
            background: #d89632;
            border: 1px solid #1a1a1a;
            box-shadow: 2px 2px 0px #1a1a1a;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
        }
        .task-meta { font-size: 12px; color: #666; margin-bottom: 15px; }
        .task-btn {
            background: #1a1a1a;
            box-shadow: 2px 2px 0px #1a1a1a;
            color: #fff;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 4px;
            font-size: 14px;
            display: inline-block;
            white-space: nowrap;
        }
        .info-card {
            background: #fff;
            border: 2px solid #1a1a1a;
            box-shadow: 5px 5px 0px #1a1a1a;
            padding: 20px;
        }
        .info-row { display: flex; flex-wrap: wrap; gap: 12px 30px; margin-bottom: 12px; }
        .info-row span { color: #555; }
        .desc { white-space: pre-wrap; color: #666; font-size: 14px; }
        .empty-box {
            color: #888;
            background: #fff;
            padding: 20px;
            border: 2px dashed #1a1a1a;
            width: 100%;
        }
    </style>
</head>
<body>
<div class="page-layout">
    <div class="sidebar">
        <div class="sidebar-header">TeachingPlatform</div>
        <div class="nav-menus">
            <a href="/home" class="nav-item">主页</a>
            <a href="/student/course/my" class="nav-item">我的课程</a>
            <a href="/student/course/selection" class="nav-item">课程选择与退选</a>
            <a href="/student/logs" class="nav-item">选退课日志</a>
            <a href="#" class="nav-item">班级管理</a>
        </div>
        <div class="sidebar-footer">
            <span th:if="${user != null}" style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">你好, <span th:text="${user.username}"></span></span>
            <a th:if="${user != null}" th:href="@{/profile}" class="login-btn" style="width:100%; box-sizing:border-box;">个人信息</a>
            <a th:if="${user != null}" th:href="@{/logout}" class="login-btn" style="width:100%; box-sizing:border-box; background: var(--accent-red); color: white;">退出</a>
        </div>
    </div>

    <div class="content-area">
        <div class="top-bar">
            <h2 class="page-title" th:text="${course.courseName}">课程主页</h2>
            <a href="/home" class="action-link">返回个人主页</a>
        </div>

        <div class="course-tabs">
            <a class="tab-item" th:classappend="${tab == 'home' ? 'active' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='home')}">首页</a>
            <a class="tab-item" th:classappend="${tab == 'info' ? 'active' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='info')}">课程信息</a>
            <a class="tab-item" th:classappend="${tab == 'homework' ? 'active' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='homework')}">在线作业</a>
            <a class="tab-item" th:classappend="${tab == 'exam' ? 'active' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='exam')}">在线考试</a>
            <a class="tab-item" th:classappend="${tab == 'lab' ? 'active' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='lab')}">编程实训</a>
        </div>

        <div class="main-content">
            <h3 class="section-title" th:if="${tab == 'home'}">作业与通知</h3>
            <h3 class="section-title" th:if="${tab == 'homework'}">在线作业</h3>
            <h3 class="section-title" th:if="${tab == 'exam'}">在线考试</h3>
            <h3 class="section-title" th:if="${tab == 'lab'}">编程实训</h3>
            <h3 class="section-title" th:if="${tab == 'info'}">课程信息</h3>

            <div th:if="${tab == 'info'}" class="info-card">
                <div class="info-row">
                    <div>课程编号：<span th:text="${course.courseCode}"></span></div>
                    <div>学分：<span th:text="${course.credit}"></span></div>
                    <div>教师：<span th:text="${course.teacherId}"></span></div>
                    <div>状态：<span th:text="${course.status}"></span></div>
                </div>
                <div class="desc" th:text="${course.description}">课程简介</div>
            </div>

            <div th:if="${tab != 'info'}" class="task-grid">
                <div th:each="task : ${tasks}" class="task-card">
                    <div class="task-title">
                        <div>
                            <span class="task-badge" th:text="${task.taskType}">作业</span>
                            <span th:text="${task.title}">作业标题</span>
                        </div>
                        <a th:href="@{/student/task/detail(taskId=${task.taskId})}"
                           class="task-btn"
                           th:text="${task.taskType == '考试' ? '进入考试' : (task.taskType == '编程实训' ? '进入实训' : '进入作业')}">进入作业</a>
                    </div>
                    <div class="task-meta">
                        发布时间: <span th:text="${#dates.format(task.startTime, 'yyyy-MM-dd HH:mm')}"></span><br>
                        总分 / 满分: <span th:text="${task.fullScore}"></span>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(tasks)}" class="empty-box">该栏目暂无内容</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
