<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a th:if="${user.role == 'student'}" href="/student/course/my">我的课程</a>
            <a th:if="${user.role == 'student'}" href="/student/course/selection">选课中心</a>
            <a th:if="${user.role == 'teacher'}" href="/teacher/course/manage">课程管理</a>
            <a th:if="${user.role == 'teacher'}" href="/teacher/task/manage">作业管理</a>
            <a th:href="${user.role == 'teacher' ? '/teacher/ai' : '/student/ai'}">AI 答疑</a>
        </nav>
        <div class="sidebar-user">
            <strong th:text="${user.username}">user</strong>
            <a class="btn danger" href="/logout">退出</a>
        </div>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>个人信息</h1></header>
        <section class="content">
            <div class="panel profile-summary">
                <div class="avatar-block" th:text="${#strings.substring(user.username,0,1)}">U</div>
                <div>
                    <h2 th:text="${user.name != null && user.name != '' ? user.name : user.username}">用户</h2>
                    <p class="muted">账号：<span th:text="${user.username}"></span> ｜ 身份：<span th:text="${user.role == 'teacher' ? '教师' : '学生'}"></span></p>
                    <p class="muted">邮箱：<span th:text="${user.email != null && user.email != '' ? user.email : '未填写'}"></span></p>
                </div>
            </div>
            <div class="stat-grid">
                <div class="stat-card"><strong th:text="${#lists.size(courses)}">0</strong><span th:text="${user.role == 'teacher' ? '管理课程' : '已选课程'}">课程</span></div>
                <div class="stat-card"><strong th:text="${submissions != null ? #lists.size(submissions) : 0}">0</strong><span>提交记录</span></div>
                <div class="stat-card"><strong th:text="${user.createdAt != null ? #dates.format(user.createdAt, 'yyyy-MM-dd') : '-'}">-</strong><span>加入时间</span></div>
            </div>
            <div class="panel">
                <h2>资料维护</h2>
                <form th:action="@{/profile}" method="post" class="form">
                    <label for="name">显示名称</label>
                    <input id="name" name="name" th:value="${user.name}" placeholder="课堂中显示的名称">
                    <label for="email">邮箱</label>
                    <input id="email" name="email" type="email" th:value="${user.email}" placeholder="用于接收课程通知">
                    <label for="roleView">当前身份</label>
                    <input id="roleView" th:value="${user.role == 'teacher' ? '教师' : '学生'}" disabled>
                    <button type="submit">保存修改</button>
                </form>
            </div>
            <div class="panel">
                <h2 th:text="${user.role == 'teacher' ? '我的教学空间' : '我的学习空间'}">概况</h2>
                <div class="course-grid" th:if="${!#lists.isEmpty(courses)}">
                    <div class="item-card" th:each="course : ${courses}">
                        <h3 th:text="${course.courseName}">课程</h3>
                        <p class="muted">编号：<span th:text="${course.courseCode}">CODE</span></p>
                        <p th:text="${course.description ?: '暂无课程简介'}">课程简介</p>
                    </div>
                </div>
                <div class="empty" th:if="${#lists.isEmpty(courses)}">暂无课程。</div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
