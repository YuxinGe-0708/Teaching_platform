<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手 - 教学平台</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-main, #f5f0e6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main, #1a1a1a);
        }
        .ai-page {
            max-width: 860px; margin: 0 auto; min-height: 100vh;
            display: flex; flex-direction: column; padding: 28px 20px;
        }
        .ai-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; margin-bottom: 16px;
            background: var(--bg-header, #264639); color: #f5f0e6;
            border: 2px solid var(--border-color, #121212);
            box-shadow: 4px 4px 0 var(--shadow-color, #121212);
        }
        .ai-topbar h2 { font-size: 20px; display: flex; align-items: center; gap: 10px; }
        .back-btn {
            color: #f5f0e6; text-decoration: none; font-size: 13px;
            padding: 6px 14px; border: 2px solid rgba(245,240,230,0.3);
            transition: all 0.15s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.12); }
        .ai-main {
            flex: 1; display: flex; flex-direction: column;
            border: 2px solid var(--border-color, #121212);
            box-shadow: 4px 4px 0 var(--shadow-color, #121212);
            background: var(--bg-card, #ffffff); overflow: hidden;
            min-height: 500px;
        }
        .ai-header {
            padding: 12px 20px; border-bottom: 2px solid var(--border-color, #121212);
            background: #faf9f4; display: flex; align-items: center; gap: 10px;
        }
        .ai-header .dot { width: 10px; height: 10px; border-radius: 50%; }
        .ai-header .dot.green { background: var(--accent-green, #2a634b); }
        .ai-header span { font-size: 13px; color: var(--muted, #555); font-weight: bold; }
        .ai-messages {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 16px;
            background: #fdfcf7;
        }
        .msg-row { display: flex; gap: 12px; max-width: 88%; }
        .msg-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.ai { align-self: flex-start; }
        .msg-avatar {
            width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
            border: 2px solid var(--border-color, #121212);
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; font-weight: bold;
        }
        .msg-row.me .msg-avatar {
            background: var(--bg-header, #264639); color: #f5f0e6;
        }
        .msg-row.ai .msg-avatar {
            background: var(--accent-yellow, #d89632); color: #1a1a1a;
        }
        .msg-bubble {
            padding: 10px 16px; font-size: 14px; line-height: 1.65;
            border: 2px solid var(--border-color, #121212);
            white-space: pre-wrap; word-break: break-word;
        }
        .msg-row.me .msg-bubble {
            background: var(--bg-header, #264639); color: #f5f0e6;
            border-radius: 16px 4px 16px 16px;
        }
        .msg-row.ai .msg-bubble {
            background: #ffffff; color: var(--text-main, #1a1a1a);
            border-radius: 4px 16px 16px 16px;
        }
        .ai-input-bar {
            display: flex; gap: 0; padding: 0; border-top: 2px solid var(--border-color, #121212);
        }
        .ai-input-bar textarea {
            flex: 1; padding: 14px 18px; border: none; font-size: 14px;
            font-family: inherit; resize: none; min-height: 52px; max-height: 120px;
            background: #ffffff; color: var(--text-main, #1a1a1a);
            line-height: 1.5;
        }
        .ai-input-bar textarea:focus { outline: none; }
        .ai-input-bar textarea::placeholder { color: #aaa; }
        .ai-input-bar button {
            width: 56px; flex-shrink: 0; border: none; border-left: 2px solid var(--border-color, #121212);
            background: var(--accent-yellow, #d89632); color: #1a1a1a;
            font-size: 20px; cursor: pointer; font-weight: bold;
            transition: background 0.15s;
        }
        .ai-input-bar button:hover { background: #e8a830; }
        .ai-input-bar button:disabled { background: #ddd; color: #999; cursor: not-allowed; }
        .typing-dots { display: flex; gap: 5px; padding: 8px 0; }
        .typing-dots span {
            width: 7px; height: 7px; background: var(--muted, #888);
            border-radius: 50%; animation: dotBounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0.5); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }
        .time-label {
            font-size: 11px; color: var(--muted, #888); margin-top: 2px;
        }
        .msg-row.me .time-label { text-align: right; }
        .clear-btn {
            font-size: 12px; color: var(--muted, #555); cursor: pointer;
            background: none; border: none; text-decoration: underline; padding: 4px 8px;
        }
        .clear-btn:hover { color: var(--accent-red, #d94a4a); }
    </style>
</head>
<body>
<div class="ai-page">
    <div class="ai-topbar">
        <h2>🤖 AI 智能助手</h2>
        <a href="/home" class="back-btn">← 返回首页</a>
    </div>
    <div class="ai-main">
        <div class="ai-header">
            <div class="dot green"></div>
            <span>在线 · DeepSeek AI</span>
            <div style="flex:1"></div>
            <button class="clear-btn" onclick="clearChat()">清空对话</button>
        </div>
        <div class="ai-messages" id="chatMessages">
            <div class="msg-row ai">
                <div class="msg-avatar">AI</div>
                <div>
                    <div class="msg-bubble">你好！我是教学平台的 AI 智能助手 👋<br>有什么学习问题可以随时问我！</div>
                    <div class="time-label" id="welcomeTime"></div>
                </div>
            </div>
        </div>
        <div class="ai-input-bar">
            <textarea id="userInput" placeholder="输入你的问题，按 Enter 发送..." rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"
                oninput="this.style.height='';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
            <button id="sendBtn" onclick="sendMessage()" title="发送 (Enter)">➤</button>
        </div>
    </div>
</div>
<script>
    const messagesDiv = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let isLoading = false;

    document.getElementById('welcomeTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = 'msg-row ' + role;
        const avatar = role === 'me' ? '我' : 'AI';
        const timeStr = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'});
        div.innerHTML = '<div class="msg-avatar">' + avatar + '</div>' +
            '<div><div class="msg-bubble">' + escapeHtml(text) + '</div>' +
            '<div class="time-label">' + timeStr + '</div></div>';
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addTyping() {
        const div = document.createElement('div');
        div.className = 'msg-row ai';
        div.id = 'typingMsg';
        div.innerHTML = '<div class="msg-avatar">AI</div>' +
            '<div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function removeTyping() {
        const el = document.getElementById('typingMsg');
        if (el) el.remove();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function sendMessage() {
        const msg = userInput.value.trim();
        if (!msg || isLoading) return;
        isLoading = true;
        sendBtn.disabled = true;
        userInput.value = '';
        userInput.style.height = '';
        addMessage('me', msg);
        addTyping();
        try {
            const res = await fetch('/api/v2/ai/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg, courseName: '通用课程' })
            });
            const data = await res.json();
            removeTyping();
            if (data.code === 200 && data.data) {
                addMessage('ai', data.data.reply || '抱歉，未获取到回复。');
            } else if (data.code === 401) {
                addMessage('ai', '请先登录后再使用 AI 助手。');
            } else {
                addMessage('ai', data.message || 'AI 回复失败，请稍后重试。');
            }
        } catch (e) {
            removeTyping();
            addMessage('ai', '网络错误：' + e.message);
        }
        isLoading = false;
        sendBtn.disabled = false;
        userInput.focus();
    }

    async function clearChat() {
        try {
            await fetch('/api/v2/ai/clear', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({})
            });
        } catch(e) {}
        messagesDiv.innerHTML = '';
        addMessage('ai', '对话已清空，有什么新问题吗？');
    }
</script>
</body>
</html>
