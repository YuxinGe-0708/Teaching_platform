<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 答疑 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
<div id="aiApp" class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a th:if="${user.role == 'student'}" href="/student/course/my">我的课程</a>
            <a th:if="${user.role == 'student'}" href="/student/course/selection">选课中心</a>
            <a th:if="${user.role == 'teacher'}" href="/teacher/course/manage">课程管理</a>
            <a th:if="${user.role == 'teacher'}" href="/teacher/task/manage">作业管理</a>
            <a th:href="${user.role == 'teacher' ? '/teacher/ai' : '/student/ai'}" class="active">AI 答疑</a>
        </nav>
        <div class="sidebar-user">
            <strong>你好，<span th:text="${user.username}">user</span></strong>
            <a class="btn" href="/profile">个人信息</a>
            <a class="btn danger" href="/logout">退出</a>
        </div>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>AI 答疑</h1></header>
        <section class="content">
            <div class="panel chat-shell">
                <div class="toolbar">
                    <h2 style="margin:0; flex:1;">课程智能助手</h2>
                    <button type="button" class="btn" @click="clearChat" :disabled="loading">清空对话</button>
                </div>
                <div class="chat-messages" ref="messagesEl">
                    <div class="msg" v-for="(message, index) in messages" :key="index" :class="message.role">
                        <div class="bubble">{{ message.text }}</div>
                    </div>
                    <div class="msg" v-if="loading"><div class="bubble">正在思考...</div></div>
                </div>
                <div class="toolbar" style="margin:16px 0 0;">
                    <textarea v-model="input" placeholder="输入你的问题，按 Enter 发送，Shift+Enter 换行" @keydown.enter.exact.prevent="sendMessage"></textarea>
                    <button class="btn primary" type="button" @click="sendMessage" :disabled="loading || !input.trim()">发送</button>
                </div>
            </div>
        </section>
    </main>
</div>
<script>
const { createApp, nextTick } = Vue;
createApp({
    data() {
        return {
            input: '',
            loading: false,
            messages: [{ role: 'ai', text: '你好，我是教学平台的 AI 答疑助手。你可以问课程知识点、作业思路或编程实训问题。' }]
        };
    },
    methods: {
        async sendMessage() {
            const text = this.input.trim();
            if (!text || this.loading) return;
            this.messages.push({ role: 'me', text });
            this.input = '';
            this.loading = true;
            await this.scrollBottom();
            try {
                const response = await fetch('/api/v2/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, courseName: '通用课程' })
                });
                const data = await response.json();
                this.messages.push({ role: 'ai', text: data.code === 200 && data.data ? data.data.reply : (data.message || 'AI 回复失败，请稍后重试。') });
            } catch (error) {
                this.messages.push({ role: 'ai', text: '网络错误：' + error.message });
            } finally {
                this.loading = false;
                await this.scrollBottom();
            }
        },
        async clearChat() {
            try {
                await fetch('/api/v2/ai/clear', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({}) });
            } catch (e) {}
            this.messages = [{ role: 'ai', text: '对话已清空。' }];
        },
        async scrollBottom() {
            await nextTick();
            if (this.$refs.messagesEl) this.$refs.messagesEl.scrollTop = this.$refs.messagesEl.scrollHeight;
        }
    }
}).mount('#aiApp');
</script>
</body>
</html>
