<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程实训 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a th:if="${user.role == 'student'}" href="/student/course/my">我的课程</a>
            <a th:if="${user.role == 'teacher'}" href="/teacher/task/manage">作业管理</a>
            <a th:href="${user.role == 'teacher' ? '/teacher/ai' : '/student/ai'}">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>编程实训</h1></header>
        <section class="content">
            <div class="panel">
                <h2>实训入口</h2>
                <p class="muted">编程实训题会从课程任务进入，并通过评测接口写回提交记录。</p>
                <a class="btn primary" href="/home">返回主页</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
