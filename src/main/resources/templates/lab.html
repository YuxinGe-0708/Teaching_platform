<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线实验评测 - 教学平台</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-main, #f5f0e6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main, #1a1a1a);
        }
        .lab-page { max-width: 1060px; margin: 0 auto; padding: 28px 20px; }
        .lab-topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; margin-bottom: 16px;
            background: var(--bg-header, #264639); color: #f5f0e6;
            border: 2px solid var(--border-color, #121212);
            box-shadow: 4px 4px 0 var(--shadow-color, #121212);
        }
        .lab-topbar h2 { font-size: 20px; }
        .back-btn {
            color: #f5f0e6; text-decoration: none; font-size: 13px;
            padding: 6px 14px; border: 2px solid rgba(245,240,230,0.3);
        }
        .back-btn:hover { background: rgba(255,255,255,0.12); }
        .lab-main {
            display: flex; gap: 0; border: 2px solid var(--border-color, #121212);
            box-shadow: 4px 4px 0 var(--shadow-color, #121212);
            background: #fff; min-height: 520px; overflow: hidden;
        }
        .editor-col {
            flex: 1; display: flex; flex-direction: column;
            border-right: 2px solid var(--border-color, #121212);
        }
        .editor-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; background: #faf9f4;
            border-bottom: 2px solid var(--border-color, #121212);
        }
        .editor-toolbar select {
            padding: 6px 12px; border: 2px solid var(--border-color, #121212);
            background: #fff; font-weight: bold; font-size: 13px;
        }
        .run-btn {
            padding: 8px 22px; background: var(--accent-yellow, #d89632);
            color: #1a1a1a; border: 2px solid var(--border-color, #121212);
            font-weight: bold; font-size: 14px; cursor: pointer;
            box-shadow: 3px 3px 0 var(--border-color, #121212);
            transition: all 0.1s;
        }
        .run-btn:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--border-color, #121212); }
        .run-btn:disabled { background: #ddd; color: #999; cursor: not-allowed; transform: none; }
        #codeEditor {
            flex: 1; padding: 16px; border: none; font-family: 'Consolas','Courier New',monospace;
            font-size: 14px; line-height: 1.6; resize: none; tab-size: 4;
            background: #fdfcf7; color: #1a1a1a;
        }
        #codeEditor:focus { outline: none; }
        .result-col {
            width: 340px; display: flex; flex-direction: column;
            background: #faf9f4;
        }
        .result-col .section {
            padding: 12px 14px; border-bottom: 2px solid var(--border-color, #121212);
        }
        .result-col .section h4 {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--muted, #888); margin-bottom: 6px;
        }
        .result-col textarea {
            width: 100%; padding: 8px 10px; border: 2px solid var(--border-color, #121212);
            font-family: 'Consolas',monospace; font-size: 13px; resize: vertical;
            background: #fff; color: #1a1a1a; line-height: 1.4;
        }
        .result-col textarea:focus { outline: none; border-color: var(--accent-green, #2a634b); }
        .result-area {
            flex: 1; overflow-y: auto; padding: 14px;
            font-family: 'Consolas',monospace; font-size: 13px; line-height: 1.5;
        }
        .status-ac { color: var(--accent-green, #2a634b); font-weight: bold; }
        .status-wa { color: #d89632; font-weight: bold; }
        .status-ce, .status-re, .status-tle, .status-ie { color: var(--accent-red, #d94a4a); font-weight: bold; }
        .case-box {
            padding: 10px 12px; margin-bottom: 8px;
            border: 2px solid var(--border-color, #121212); background: #fff;
        }
        .case-box .case-head {
            display: flex; justify-content: space-between;
            font-weight: bold; font-size: 13px; margin-bottom: 6px;
        }
        .case-box .case-body { font-size: 12px; color: var(--muted, #555); line-height: 1.5; }
    </style>
</head>
<body>
<div class="lab-page">
    <div class="lab-topbar">
        <h2>💻 在线实验评测</h2>
        <a href="/home" class="back-btn">← 返回首页</a>
    </div>
    <div class="lab-main">
        <div class="editor-col">
            <div class="editor-toolbar">
                <select id="languageSelect">
                    <option value="python" selected>Python</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                </select>
                <button class="run-btn" id="runBtn" onclick="runCode()">▶ 运行评测</button>
            </div>
            <textarea id="codeEditor" placeholder="在此输入代码..."># Hello World 示例
print("Hello World")

# 使用 input() 读取标准输入</textarea>
        </div>
        <div class="result-col">
            <div class="section">
                <h4>标准输入</h4>
                <textarea id="testInput" rows="2" placeholder="输入..."></textarea>
            </div>
            <div class="section">
                <h4>期望输出</h4>
                <textarea id="expectedOutput" rows="2" placeholder="期望...">Hello World</textarea>
            </div>
            <div class="result-area" id="resultArea">
                <div style="color:var(--muted);">点击"运行评测"查看结果...</div>
            </div>
        </div>
    </div>
</div>
<script>
    async function runCode() {
        const code = document.getElementById('codeEditor').value.trim();
        const language = document.getElementById('languageSelect').value;
        const testInput = document.getElementById('testInput').value;
        const expectedOutput = document.getElementById('expectedOutput').value;
        const resultArea = document.getElementById('resultArea');
        const runBtn = document.getElementById('runBtn');
        if (!code) { resultArea.innerHTML = '<div style="color:var(--accent-red);">请先输入代码！</div>'; return; }
        runBtn.disabled = true; runBtn.textContent = '评测中...';
        resultArea.innerHTML = '<div style="color:var(--muted);">⏳ 正在评测...</div>';
        try {
            const res = await fetch('/api/v2/judge/submit', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ taskId: 1, code, language, testCases: [{input: testInput, expectedOutput}] })
            });
            const data = await res.json();
            if (data.code === 401) { resultArea.innerHTML = '<div style="color:var(--accent-red);">请先登录。</div>'; return; }
            let html = '';
            if (data.code === 200 && data.data) {
                const d = data.data;
                html += '<div style="margin-bottom:12px;font-size:13px;">';
                html += '<div>状态：<span class="status-'+(d.status||'').toLowerCase()+'">'+d.status+'</span></div>';
                html += '<div>得分：<strong>'+(d.score||0)+'</strong> 分 &nbsp; 通过：<strong>'+(d.passedCases||0)+'/'+(d.totalCases||0)+'</strong></div>';
                html += '<div>用时：'+(d.timeUsedMs||0).toFixed(0)+' ms</div></div>';
                if (d.caseResults) d.caseResults.forEach(function(cr){
                    html += '<div class="case-box"><div class="case-head"><span>#'+cr.caseIndex+'</span><span class="status-'+(cr.status||'').toLowerCase()+'">'+cr.status+'</span></div>';
                    html += '<div class="case-body">输入: '+escapeHtml(cr.input)+'<br>期望: '+escapeHtml(cr.expectedOutput)+'<br>实际: '+escapeHtml(cr.actualOutput)+'</div></div>';
                });
                if (d.errorMessage) html += '<div style="color:var(--accent-red);margin-top:8px;">'+escapeHtml(d.errorMessage)+'</div>';
            } else {
                html = '<div style="color:var(--accent-red);">'+(data.message||'评测失败')+'</div>';
            }
            resultArea.innerHTML = html;
        } catch(e) {
            resultArea.innerHTML = '<div style="color:var(--accent-red);">网络错误：'+e.message+'</div>';
        } finally { runBtn.disabled = false; runBtn.textContent = '▶ 运行评测'; }
    }
    function escapeHtml(t){const d=document.createElement('div');d.textContent=t||'';return d.innerHTML;}
</script>
</body>
</html>
