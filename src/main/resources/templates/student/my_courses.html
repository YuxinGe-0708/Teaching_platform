<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课程 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/student/course/my" class="active">我的课程</a>
            <a href="/student/course/selection">选课中心</a>
            <a href="/student/logs">选课记录</a>
            <a href="/student/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>我的课程</h1><a class="btn primary" href="/student/course/selection">继续选课</a></header>
        <section class="content">
            <div class="course-grid" th:if="${!#lists.isEmpty(courses)}">
                <article class="item-card" th:each="course : ${courses}">
                    <span class="status-badge" th:text="${course.status}">进行中</span>
                    <h3 th:text="${course.courseName}">课程名称</h3>
                    <p class="muted">编号：<span th:text="${course.courseCode}"></span> ｜ 学分：<span th:text="${course.credit}"></span></p>
                    <p>教师：<span th:text="${course.teacherId}"></span></p>
                    <p th:text="${course.description ?: '暂无课程简介'}">简介</p>
                    <div class="card-actions">
                        <a th:href="@{/student/course/detail/{id}(id=${course.courseId})}" class="btn primary">进入课程</a>
                        <form action="/student/course/drop" method="post">
                            <input type="hidden" name="courseId" th:value="${course.courseId}">
                            <button type="submit" class="btn danger">退课</button>
                        </form>
                    </div>
                </article>
            </div>
            <div class="empty" th:if="${#lists.isEmpty(courses)}">你还没有选修任何课程。</div>
        </section>
    </main>
</div>
</body>
</html>
