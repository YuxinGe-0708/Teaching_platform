<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/student/course/my">我的课程</a>
            <a href="/student/course/selection">选课中心</a>
            <a href="/student/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar">
            <h1 th:text="${task.title}">任务详情</h1>
            <a class="btn" th:href="@{/student/course/detail/{id}(id=${course.courseId})}">返回课程</a>
        </header>
        <section class="content">
            <div class="message success" th:if="${success}" th:text="${success}"></div>
            <div class="message error" th:if="${error}" th:text="${error}"></div>

            <div class="panel">
                <span class="status-badge" th:text="${task.taskType}">作业</span>
                <p class="muted">满分：<span th:text="${task.fullScore}"></span> ｜ 状态：<span th:text="${task.status}"></span></p>
                <div class="task-content" th:if="${taskContentHtml != null && taskContentHtml != ''}" th:utext="${taskContentHtml}">任务内容</div>
            </div>

            <div class="panel" th:if="${submission != null}">
                <h2>提交记录</h2>
                <p>状态：<span class="status-badge" th:text="${submission.submitStatus}">已提交</span></p>
                <p>提交时间：<span th:text="${#dates.format(submission.submitTime, 'yyyy-MM-dd HH:mm')}"></span></p>
                <p th:if="${submission.score != null}">得分：<span th:text="${submission.score}"></span></p>
                <p th:if="${submission.judgeStatus != null}">评测：<span th:text="${submission.judgeStatus}"></span></p>
                <p th:if="${submission.comment != null && submission.comment != ''}">反馈：<span th:text="${submission.comment}"></span></p>
                <a th:if="${submission.fileUrl != null}" class="btn" th:href="@{/student/task/download(filePath=${submission.fileUrl})}">下载附件</a>
            </div>

            <div class="panel" th:if="${task.taskKind != 'programming'}">
                <h2 th:text="${task.taskKind == 'exam' ? '提交试卷' : '提交作业'}">提交</h2>
                <form action="/student/task/submit" method="post" enctype="multipart/form-data" class="form">
                    <input type="hidden" name="taskId" th:value="${task.taskId}">
                    <label for="content">答案内容</label>
                    <textarea id="content" name="content" placeholder="输入答案、思路或说明"></textarea>
                    <label for="file" th:if="${task.taskKind != 'exam'}">附件</label>
                    <input id="file" type="file" name="file" th:if="${task.taskKind != 'exam'}">
                    <button type="submit" th:text="${task.taskKind == 'exam' ? '提交试卷' : '提交作业'}">提交</button>
                </form>
            </div>

            <div class="panel" th:if="${task.taskKind == 'programming'}" th:inline="javascript">
                <h2>Web IDE</h2>
                <div class="toolbar">
                    <select id="language">
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="cpp">C++</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                    <button type="button" class="btn primary" id="judgeBtn">运行评测</button>
                </div>
                <textarea id="codeEditor" class="ide-area" spellcheck="false">print("Hello World")</textarea>
                <h3>评测输出</h3>
                <div id="judgeOutput" class="ide-output">点击“运行评测”后查看结果。</div>
                <script th:inline="javascript">
                    const taskId = /*[[${task.taskId}]]*/ 0;
                    const testCases = JSON.parse(/*[[${task.testCasesJson}]]*/ '[]');
                    document.getElementById('judgeBtn').addEventListener('click', async () => {
                        const output = document.getElementById('judgeOutput');
                        const button = document.getElementById('judgeBtn');
                        button.disabled = true;
                        output.textContent = '评测中...';
                        try {
                            const response = await fetch('/api/v2/judge/submit', {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({
                                    taskId,
                                    code: document.getElementById('codeEditor').value,
                                    language: document.getElementById('language').value,
                                    testCases
                                })
                            });
                            const data = await response.json();
                            if (data.code !== 200) {
                                output.textContent = data.message || '评测失败';
                                return;
                            }
                            const result = data.data;
                            output.innerHTML =
                                '<strong>状态：</strong>' + result.status +
                                ' ｜ <strong>得分：</strong>' + result.score +
                                ' ｜ <strong>通过：</strong>' + result.passedCases + '/' + result.totalCases +
                                '<pre>' + JSON.stringify(result.caseResults, null, 2) + '</pre>';
                        } catch (e) {
                            output.textContent = '评测请求失败：' + e.message;
                        } finally {
                            button.disabled = false;
                        }
                    });
                </script>
            </div>
        </section>
    </main>
</div>
</body>
</html>
