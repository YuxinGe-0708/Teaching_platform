<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'课程主页 - ' + ${course.courseName}">课程主页</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/student/course/my" class="active">我的课程</a>
            <a href="/student/course/selection">选课中心</a>
            <a href="/student/ai">AI 答疑</a>
        </nav>
        <div class="sidebar-user">
            <strong>你好，<span th:text="${user.username}">user</span></strong>
            <a class="btn" href="/profile">个人信息</a>
            <a class="btn danger" href="/logout">退出</a>
        </div>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1 th:text="${course.courseName}">课程主页</h1></header>
        <section class="content">
            <div class="toolbar">
                <a class="btn" th:classappend="${tab == 'home' ? ' primary' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='home')}">全部</a>
                <a class="btn" th:classappend="${tab == 'info' ? ' primary' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='info')}">课程信息</a>
                <a class="btn" th:classappend="${tab == 'homework' ? ' primary' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='homework')}">作业</a>
                <a class="btn" th:classappend="${tab == 'exam' ? ' primary' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='exam')}">考试</a>
                <a class="btn" th:classappend="${tab == 'lab' ? ' primary' : ''}" th:href="@{/student/course/detail/{id}(id=${course.courseId}, tab='lab')}">编程实训</a>
            </div>
            <div class="panel" th:if="${tab == 'info'}">
                <h2>课程信息</h2>
                <p>课程编号：<span th:text="${course.courseCode}">CODE</span></p>
                <p>学分：<span th:text="${course.credit}">0</span></p>
                <p>教师：<span th:text="${course.teacherId}">teacher</span></p>
                <p th:text="${course.description ?: '暂无课程简介'}">课程简介</p>
            </div>
            <div th:if="${tab != 'info'}">
                <div class="course-grid" th:if="${!#lists.isEmpty(tasks)}">
                    <article class="item-card" th:each="task : ${tasks}">
                        <span class="status-badge" th:text="${task.taskType}">作业</span>
                        <h3 th:text="${task.title}">任务标题</h3>
                        <p class="muted">发布时间：<span th:text="${#dates.format(task.startTime, 'yyyy-MM-dd HH:mm')}"></span></p>
                        <p class="muted">满分：<span th:text="${task.fullScore}"></span></p>
                        <p th:text="${task.description ?: '暂无任务说明'}">任务说明</p>
                        <div class="card-actions">
                            <a class="btn primary" th:href="@{/student/task/detail(taskId=${task.taskId})}" th:text="${task.taskKind == 'programming' ? '进入 IDE' : (task.taskKind == 'exam' ? '进入考试' : '进入作业')}">进入</a>
                        </div>
                    </article>
                </div>
                <div class="empty" th:if="${#lists.isEmpty(tasks)}">该栏目暂无内容。</div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
