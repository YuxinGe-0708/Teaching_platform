<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课记录 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/student/course/my">我的课程</a>
            <a href="/student/course/selection">选课中心</a>
            <a href="/student/logs" class="active">选课记录</a>
            <a href="/student/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>选课记录</h1></header>
        <section class="content">
            <div class="panel" th:if="${!#lists.isEmpty(logs)}">
                <p th:each="log : ${logs}" th:text="${log}">记录</p>
            </div>
            <div class="empty" th:if="${#lists.isEmpty(logs)}">暂无选退课记录。</div>
        </section>
    </main>
</div>
</body>
</html>
