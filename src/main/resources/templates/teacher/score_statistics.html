<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩统计 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav"><a href="/home">主页</a><a href="/teacher/course/manage">课程管理</a><a href="/teacher/task/manage">作业管理</a><a href="/teacher/score/statistics" class="active">成绩统计</a><a href="/teacher/ai">AI 答疑</a></nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>成绩统计</h1></header>
        <section class="content">
            <table>
                <thead><tr><th>课程</th><th>任务数</th><th>提交数</th><th>已批改</th><th>平均分</th></tr></thead>
                <tbody>
                <tr th:each="s : ${stats}">
                    <td th:text="${s.courseName}">课程</td>
                    <td th:text="${s.taskCount}">0</td>
                    <td th:text="${s.submissionCount}">0</td>
                    <td th:text="${s.gradedCount}">0</td>
                    <td th:text="${s.averageScore}">0</td>
                </tr>
                <tr th:if="${#lists.isEmpty(stats)}"><td colspan="5">暂无统计数据。</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
