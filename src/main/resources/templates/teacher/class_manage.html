<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand">TeachingPlatform</div><nav class="sidebar-nav"><a href="/home">主页</a><a href="/teacher/course/manage" class="active">课程管理</a><a href="/teacher/task/manage">作业管理</a><a href="/teacher/ai">AI 答疑</a></nav></aside>
    <main class="main-area">
        <header class="topbar"><h1 th:text="'班级管理 - ' + ${course.courseName}">班级管理</h1><a class="btn" href="/teacher/course/manage">返回</a></header>
        <section class="content">
            <div class="panel">
                <form action="/teacher/course/class/create" method="post" class="form-inline">
                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                    <div><label for="className">班级名称</label><input id="className" type="text" name="className" required></div>
                    <div><label for="maxCount">人数上限</label><input id="maxCount" type="number" name="maxCount" value="100" min="1"></div>
                    <button type="submit" class="btn primary">创建班级</button>
                </form>
            </div>
            <table>
                <thead><tr><th>班级名称</th><th>邀请码</th><th>人数</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="cls : ${classes}">
                    <td th:text="${cls.className}">班级名称</td>
                    <td><strong th:text="${cls.inviteCode}">CODE</strong></td>
                    <td th:text="${cls.currentCount} + ' / ' + ${cls.maxCount}">0 / 100</td>
                    <td><a class="btn danger" th:href="@{/teacher/course/class/delete(courseId=${course.courseId}, classId=${cls.classId})}" onclick="return confirm('确定删除该班级吗？')">删除</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(classes)}"><td colspan="4">暂无班级。</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
