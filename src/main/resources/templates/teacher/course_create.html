<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建课程 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand">TeachingPlatform</div><nav class="sidebar-nav"><a href="/home">主页</a><a href="/teacher/course/manage" class="active">课程管理</a><a href="/teacher/task/manage">作业管理</a><a href="/teacher/ai">AI 答疑</a></nav></aside>
    <main class="main-area">
        <header class="topbar"><h1>创建课程</h1><a class="btn" href="/teacher/course/manage">返回</a></header>
        <section class="content">
            <div class="panel">
                <form action="/teacher/course/create" method="post" class="form">
                    <label for="courseName">课程名称</label>
                    <input id="courseName" type="text" name="courseName" required>
                    <label for="courseCode">课程编号</label>
                    <input id="courseCode" type="text" name="courseCode" required>
                    <label for="credit">学分</label>
                    <input id="credit" type="number" name="credit" step="0.5" value="2" required>
                    <label for="description">课程简介</label>
                    <textarea id="description" name="description"></textarea>
                    <button type="submit">创建</button>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
