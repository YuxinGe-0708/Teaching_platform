<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑课程 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar"><div class="sidebar-brand">TeachingPlatform</div><nav class="sidebar-nav"><a href="/home">主页</a><a href="/teacher/course/manage" class="active">课程管理</a><a href="/teacher/task/manage">作业管理</a><a href="/teacher/ai">AI 答疑</a></nav></aside>
    <main class="main-area">
        <header class="topbar"><h1>编辑课程</h1><a class="btn" href="/teacher/course/manage">返回</a></header>
        <section class="content">
            <div class="panel" th:if="${course != null}">
                <form action="/teacher/course/update" method="post" class="form">
                    <input type="hidden" name="courseId" th:value="${course.courseId}">
                    <label for="courseName">课程名称</label>
                    <input id="courseName" type="text" name="courseName" th:value="${course.courseName}" required>
                    <label for="courseCode">课程编号</label>
                    <input id="courseCode" type="text" name="courseCode" th:value="${course.courseCode}" required>
                    <label for="credit">学分</label>
                    <input id="credit" type="number" name="credit" step="0.5" th:value="${course.credit}" required>
                    <label for="description">课程简介</label>
                    <textarea id="description" name="description" th:text="${course.description}"></textarea>
                    <button type="submit">保存</button>
                </form>
            </div>
            <div class="empty" th:if="${course == null}">课程不存在。</div>
        </section>
    </main>
</div>
</body>
</html>
