<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布任务 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/teacher/course/manage">课程管理</a>
            <a href="/teacher/task/manage" class="active">作业管理</a>
            <a href="/teacher/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>发布任务</h1><a class="btn" href="/teacher/task/manage">返回</a></header>
        <section class="content">
            <div class="panel">
                <form action="/teacher/task/create" method="post" class="form">
                    <div class="split-workspace">
                        <div>
                            <label for="courseId">课程</label>
                            <select id="courseId" name="courseId" required>
                                <option th:each="c : ${courses}" th:value="${c.courseId}" th:text="${c.courseName} + ' [' + ${c.courseCode} + ']'" th:selected="${c.courseId == selectedCourseId}"></option>
                            </select>
                            <label for="title">标题</label>
                            <input id="title" type="text" name="title" required>
                            <label for="taskType">类型</label>
                            <select id="taskType" name="taskType">
                                <option value="作业">作业</option>
                                <option value="考试">考试</option>
                                <option value="编程实训">编程实训</option>
                            </select>
                            <label for="fullScore">满分</label>
                            <input id="fullScore" type="number" name="fullScore" step="1" value="100">
                            <label for="endTime">截止时间</label>
                            <input id="endTime" type="datetime-local" name="endTime">
                            <label for="mdFile">从本地 Markdown 导入</label>
                            <input id="mdFile" type="file" accept=".md,.markdown,text/markdown,text/plain">
                            <label for="content">任务说明（Markdown）</label>
                            <textarea id="content" name="content" placeholder="可直接输入 Markdown，或从 .md 文件导入。"></textarea>
                        </div>
                        <div>
                            <h3>Markdown 预览</h3>
                            <div id="preview" class="markdown-preview">在左侧输入或导入 Markdown 后，这里会显示渲染效果。</div>
                            <div id="examFields" style="margin-top:16px;">
                                <label for="examAnswer">考试标准答案（可选，填写后提交时自动判分）</label>
                                <input id="examAnswer" name="examAnswer" placeholder="例如：A 或 标准填空答案">
                            </div>
                            <div id="judgeFields" style="margin-top:16px;">
                                <label for="sampleInput">编程测试输入</label>
                                <textarea id="sampleInput" name="sampleInput" style="min-height:80px;" placeholder="没有输入可留空"></textarea>
                                <label for="expectedOutput">期望输出</label>
                                <textarea id="expectedOutput" name="expectedOutput" style="min-height:80px;" placeholder="例如：Hello World"></textarea>
                            </div>
                        </div>
                    </div>
                    <button type="submit">发布</button>
                </form>
            </div>
        </section>
    </main>
</div>
<script>
const content = document.getElementById('content');
const preview = document.getElementById('preview');
const taskType = document.getElementById('taskType');
const examFields = document.getElementById('examFields');
const judgeFields = document.getElementById('judgeFields');
let timer = null;

function updateTypeFields() {
    examFields.style.display = taskType.value === '考试' ? 'block' : 'none';
    judgeFields.style.display = taskType.value === '编程实训' ? 'block' : 'none';
}

async function renderMarkdown() {
    clearTimeout(timer);
    timer = setTimeout(async () => {
        const markdown = content.value;
        if (!markdown.trim()) {
            preview.textContent = '在左侧输入或导入 Markdown 后，这里会显示渲染效果。';
            return;
        }
        try {
            const response = await fetch('/api/v2/markdown/render', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({markdown})
            });
            const data = await response.json();
            preview.innerHTML = data.code === 200 ? data.data.html : '预览失败';
        } catch (e) {
            preview.textContent = '预览失败：' + e.message;
        }
    }, 220);
}

document.getElementById('mdFile').addEventListener('change', async (event) => {
    const file = event.target.files[0];
    if (!file) return;
    content.value = await file.text();
    renderMarkdown();
});
content.addEventListener('input', renderMarkdown);
taskType.addEventListener('change', updateTypeFields);
updateTypeFields();
</script>
</body>
</html>
