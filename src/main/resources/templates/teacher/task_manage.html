<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作业管理 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/teacher/course/manage">课程管理</a>
            <a href="/teacher/task/manage" class="active">作业管理</a>
            <a href="/teacher/score/statistics">成绩统计</a>
            <a href="/teacher/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>作业与考试管理</h1><a class="btn primary" href="/teacher/task/create">发布任务</a></header>
        <section class="content">
            <table>
                <thead><tr><th>标题</th><th>课程</th><th>类型</th><th>满分</th><th>状态</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="t : ${tasks}">
                    <td th:text="${t.title}">任务标题</td>
                    <td><span th:each="c : ${courses}" th:if="${c.courseId == t.courseId}" th:text="${c.courseName}"></span></td>
                    <td><span class="status-badge" th:text="${t.taskType}">类型</span></td>
                    <td th:text="${t.fullScore}">100</td>
                    <td th:text="${t.status}">已发布</td>
                    <td>
                        <a class="btn" th:href="@{/teacher/task/detail/{taskId}(taskId=${t.taskId})}">查看/批改</a>
                        <a class="btn danger" th:href="@{/teacher/task/delete(taskId=${t.taskId})}" onclick="return confirm('确定删除该任务吗？')">删除</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(tasks)}"><td colspan="6">暂无任务。</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
