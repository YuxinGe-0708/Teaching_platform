<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>作业详情 - 教学平台</title>
  <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
  <style>
    body { background-color: #f5f0e6; color: #1a1a1a; padding: 40px; font-family: sans-serif; }
    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; border-bottom: 2px solid #1a1a1a; padding-bottom: 16px; }
    .task-info { background: #ffffff; padding: 20px; border-radius: 0; margin-bottom: 30px; border: 2px solid #1a1a1a; box-shadow: 5px 5px 0px #1a1a1a; }
    .task-info h2 { margin-top: 0; }
    .task-desc { color: #555; margin: 15px 0; white-space: pre-wrap; }
    .task-content { background: #ffffff; border: 2px dashed #1a1a1a; padding: 16px; white-space: pre-wrap; margin-top: 10px; }
    .btn-gray { background: #e0e0e0; color: #1a1a1a; padding: 8px 16px; text-decoration: none; border-radius: 0; border: 2px solid #1a1a1a; box-shadow: 3px 3px 0px #1a1a1a; }
    table { width: 100%; border-collapse: collapse; background: #ffffff; border: 2px solid #1a1a1a; box-shadow: 5px 5px 0px #1a1a1a; }
    th, td { padding: 12px; border-bottom: 2px solid #1a1a1a; border-right: 2px solid #1a1a1a; text-align: left; }
    th { color: #1a1a1a; background: #e0e0e0; }
    .status-submitted { color: #2a634b; font-weight: bold; }
    .status-graded { color: #d89632; font-weight: bold; }
    .grade-link { color: #2a634b; text-decoration: underline; font-weight: bold; }
    .score { font-weight: bold; }
    .file-link { color: #2a634b; text-decoration: underline; font-weight: bold; }
  </style>
</head>
<body>

<div class="header-box">
  <h1>作业批改</h1>
  <a href="/teacher/task/manage" class="btn-gray">← 返回作业管理</a>
</div>

<div class="task-info" th:if="${task != null}">
  <h2 th:text="${task.title}">作业标题</h2>
  <p>类型：<span th:text="${task.taskType}"></span> | 满分：<span th:text="${task.fullScore}"></span>分 | 状态：<span th:text="${task.status}"></span></p>
  <div class="task-desc" th:text="${task.description}">作业描述</div>
  <div th:if="${taskContentHtml != null && taskContentHtml != ''}" class="task-content" th:utext="${taskContentHtml}">作业内容</div>
  <div class="task-desc" th:if="${task.allowedFileTypes != null && task.allowedFileTypes != ''}">允许格式：<span th:text="${task.allowedFileTypes}"></span></div>
</div>

<h3>学生提交列表</h3>

<table>
  <thead>
  <tr>
    <th>学生</th>
    <th>提交时间</th>
    <th>提交状态</th>
    <th>得分</th>
    <th>评测结果</th>
    <th>附件</th>
    <th>操作</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="sub : ${submissions}">
    <td th:text="${sub.studentName != null ? sub.studentName : '学生ID:' + sub.studentId}">学生</td>
    <td th:text="${#dates.format(sub.submitTime, 'yyyy-MM-dd HH:mm')}">提交时间</td>
    <td><span th:classappend="${sub.submitStatus == '已批改' ? 'status-graded' : 'status-submitted'}" th:text="${sub.submitStatus}">状态</span></td>
    <td class="score" th:text="${sub.score != null ? sub.score + '分' : '未批改'}">得分</td>
    <td th:text="${sub.judgeStatus != null ? sub.judgeStatus : '-'}">评测结果</td>
    <td>
      <a th:if="${sub.fileUrl != null}" th:href="@{/teacher/task/download(filePath=${sub.fileUrl})}" class="file-link">下载</a>
      <span th:if="${sub.fileUrl == null}">-</span>
    </td>
    <td>
      <a th:href="@{/teacher/task/grade/{submissionId}(submissionId=${sub.submissionId})}" class="grade-link">✏️ 批改/查看</a>
    </td>
  </tr>
  <tr th:if="${#lists.isEmpty(submissions)}">
    <td colspan="7" style="text-align: center; color: #555;">暂无学生提交记录</td>
  </tr>
  </tbody>
</table>

</body>
</html>
