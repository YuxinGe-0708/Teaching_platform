<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>作业详情 - 教学平台</title>
  <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
  <style>
    body { background-color: #0b0f19; color: #e0e0e0; padding: 40px; }
    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
    .task-info { background: #1a1e29; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 4px solid #4a90e2; }
    .task-info h2 { margin-top: 0; }
    .task-desc { color: #8c92a5; margin: 15px 0; }
    .btn-gray { background: #555; color: white; padding: 8px 16px; text-decoration: none; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; background: #1a1e29; }
    th, td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
    th { color: #4a90e2; }
    .status-submitted { color: #2ecc71; }
    .status-graded { color: #f1c40f; }
    .grade-link { color: #4a90e2; text-decoration: none; }
    .score { font-weight: bold; }
  </style>
</head>
<body>

<div class="header-box">
  <h1>作业批改</h1>
  <a href="/teacher/task/manage" class="btn-gray">← 返回作业管理</a>
</div>

<div class="task-info" th:if="${task != null}">
  <h2 th:text="${task.title}">作业标题</h2>
  <p>类型：<span th:text="${task.taskType}"></span> | 满分：<span th:text="${task.fullScore}"></span>分 | 状态：<span th:text="${task.status}"></span></p>
  <div class="task-desc" th:text="${task.description}">作业描述</div>
</div>

<h3>学生提交列表</h3>

<table>
  <thead>
  <tr>
    <th>学生</th>
    <th>提交时间</th>
    <th>提交状态</th>
    <th>得分</th>
    <th>评测结果</th>
    <th>操作</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="sub : ${submissions}">
    <td th:text="${sub.studentName != null ? sub.studentName : '学生ID:' + sub.studentId}">学生</td>
    <td th:text="${#dates.format(sub.submitTime, 'yyyy-MM-dd HH:mm')}">提交时间</td>
    <td><span th:classappend="${sub.submitStatus == '已批改' ? 'status-graded' : 'status-submitted'}" th:text="${sub.submitStatus}">状态</span></td>
    <td class="score" th:text="${sub.score != null ? sub.score + '分' : '未批改'}">得分</td>
    <td th:text="${sub.judgeStatus != null ? sub.judgeStatus : '-'}">评测结果</td>
    <td>
      <a th:href="@{/teacher/task/grade/{submissionId}(submissionId=${sub.submissionId})}" class="grade-link">✏️ 批改/查看</a>
    </td>
  </tr>
  <tr th:if="${#lists.isEmpty(submissions)}">
    <td colspan="6" style="text-align: center; color: #555;">暂无学生提交记录</td>
  </tr>
  </tbody>
</table>

</body>
</html>
