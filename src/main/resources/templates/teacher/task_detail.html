<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/teacher/course/manage">课程管理</a>
            <a href="/teacher/task/manage" class="active">作业管理</a>
            <a href="/teacher/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1 th:text="${task.title}">任务详情</h1><a class="btn" href="/teacher/task/manage">返回</a></header>
        <section class="content">
            <div class="panel">
                <span class="status-badge" th:text="${task.taskType}">作业</span>
                <p class="muted">满分：<span th:text="${task.fullScore}"></span> ｜ 状态：<span th:text="${task.status}"></span></p>
                <div class="task-content" th:if="${taskContentHtml != null && taskContentHtml != ''}" th:utext="${taskContentHtml}">任务内容</div>
            </div>
            <table>
                <thead><tr><th>学生</th><th>提交时间</th><th>状态</th><th>得分</th><th>评测</th><th>附件</th><th>操作</th></tr></thead>
                <tbody>
                <tr th:each="sub : ${submissions}">
                    <td th:text="${sub.studentName != null ? sub.studentName : '学生ID:' + sub.studentId}">学生</td>
                    <td th:text="${#dates.format(sub.submitTime, 'yyyy-MM-dd HH:mm')}">提交时间</td>
                    <td><span class="status-badge" th:text="${sub.submitStatus}">状态</span></td>
                    <td th:text="${sub.score != null ? sub.score + '分' : '未批改'}">得分</td>
                    <td th:text="${sub.judgeStatus}">评测</td>
                    <td><a th:if="${sub.fileUrl != null}" class="btn" th:href="@{/teacher/task/download(filePath=${sub.fileUrl})}">下载</a><span th:if="${sub.fileUrl == null}">-</span></td>
                    <td><a class="btn primary" th:href="@{/teacher/task/grade/{submissionId}(submissionId=${sub.submissionId})}">批改</a></td>
                </tr>
                <tr th:if="${#lists.isEmpty(submissions)}"><td colspan="7">暂无提交。</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
</body>
</html>
