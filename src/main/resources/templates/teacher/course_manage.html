<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程管理 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home">主页</a>
            <a href="/teacher/course/manage" class="active">课程管理</a>
            <a href="/teacher/task/manage">作业管理</a>
            <a href="/teacher/score/statistics">成绩统计</a>
            <a href="/teacher/ai">AI 答疑</a>
        </nav>
    </aside>
    <main class="main-area">
        <header class="topbar"><h1>课程管理</h1><a class="btn primary" href="/teacher/course/create">创建课程</a></header>
        <section class="content">
            <div class="course-grid" th:if="${!#lists.isEmpty(courses)}">
                <article class="item-card" th:each="c : ${courses}">
                    <span class="status-badge" th:text="${c.status}">进行中</span>
                    <h3 th:text="${c.courseName} + ' [' + ${c.courseCode} + ']'">课程名称</h3>
                    <p class="muted">学分：<span th:text="${c.credit}"></span> ｜ 学生：<span th:text="${c.studentCount}"></span></p>
                    <p th:text="${c.description ?: '暂无课程简介'}">课程简介</p>
                    <p class="muted">邀请码：<strong th:text="${c.classes.size() > 0 ? c.classes[0].inviteCode : '暂无'}">CODE</strong></p>
                    <div class="card-actions">
                        <a class="btn primary" th:href="@{/teacher/task/create(courseId=${c.courseId})}">布置任务</a>
                        <a class="btn" th:href="@{/teacher/course/class/{courseId}(courseId=${c.courseId})}">班级</a>
                        <a class="btn" th:href="@{/teacher/course/edit/{id}(id=${c.courseId})}">编辑</a>
                        <a class="btn danger" th:href="@{/teacher/course/delete/{id}(id=${c.courseId})}" onclick="return confirm('确定删除该课程吗？')">删除</a>
                    </div>
                </article>
            </div>
            <div class="empty" th:if="${#lists.isEmpty(courses)}">暂无课程，请先创建课程。</div>
        </section>
    </main>
</div>
</body>
</html>
