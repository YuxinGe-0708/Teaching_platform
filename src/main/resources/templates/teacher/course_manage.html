<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>课程管理 - 教学平台</title>
  <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
  <style>
    body { background-color: #0b0f19; color: #e0e0e0; padding: 40px; font-family: sans-serif; }
    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #2a3040; padding-bottom: 20px; }
    .btn-blue { background-color: #4a90e2; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; }
    .btn-gray { background-color: #444; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; }
    .course-card { background: #1a1e29; border: 1px solid #333; padding: 25px; margin-bottom: 20px; border-radius: 8px; transition: all 0.3s; }
    .course-card:hover { border-color: #4a90e2; }
    .course-card.highlight {
      border-color: #f1c40f;
      background: #1e2538;
      box-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
    }
    .course-desc { color: #8c92a5; margin: 10px 0; font-size: 14px; }
    .action-links { margin-top: 15px; display: flex; gap: 20px; flex-wrap: wrap; }
    .delete-link { color: #e24a4a; text-decoration: none; }
    .edit-link { color: #f1c40f; text-decoration: none; }
    .manage-link { color: #4a90e2; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

<div class="header-box">
  <h1>课程管理</h1>
  <div>
    <a href="/home" class="btn-gray">← 返回主页</a>
  </div>
</div>

<div style="margin-bottom: 30px;">
  <a href="/teacher/course/create" class="btn-blue">＋ 创建新课程</a>
</div>

<div th:each="c : ${courses}" class="course-card" th:classappend="${highlightCourseId == c.courseId} ? 'highlight' : ''">
  <h2 th:text="${c.courseName} + ' [' + ${c.courseCode} + ']'">课程名称</h2>
  <p style="color: #8c92a5;">学分：<span th:text="${c.credit}"></span></p>
  <div class="course-desc" th:text="'课程描述：' + ${c.description}">课程描述</div>
  <p style="color: #8c92a5; font-size: 12px;">
    默认班级邀请码：<span th:text="${c.classes.size() > 0 ? c.classes[0].inviteCode : '暂无'}" style="color: #f1c40f;"></span>
  </p>

  <div class="action-links">
    <a th:href="@{/teacher/task/create(courseId=${c.courseId})}" class="manage-link">📝 布置作业</a>
    <a th:href="@{/teacher/course/class/{courseId}(courseId=${c.courseId})}" class="manage-link">👥 班级管理</a>
    <a th:href="@{/teacher/course/edit/{id}(id=${c.courseId})}" class="edit-link">✏️ 编辑课程</a>
    <a th:href="@{/teacher/course/delete/{id}(id=${c.courseId})}"
       class="delete-link"
       onclick="return confirm('确定要删除这门课程吗？此操作不可恢复！')">🗑 删除课程</a>
  </div>
</div>

<div th:if="${#lists.isEmpty(courses)}" style="text-align: center; margin-top: 50px; color: #555;">
  <h3>你还没有创建过课程，点击上方按钮开始创建。</h3>
</div>

</body>
</html>
