<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/" class="active">入口</a>
            <a href="/login">登录</a>
            <a href="/register">注册</a>
        </nav>
    </aside>
    <main class="main-area">
        <section class="hero-band">
            <h2>教学平台</h2>
            <p>所有功能页面均位于 Thymeleaf templates 下，运行数据统一写入 MySQL。</p>
        </section>
        <section class="content">
            <div class="toolbar">
                <a class="btn primary" th:if="${user == null}" href="/login">登录</a>
                <a class="btn" th:if="${user == null}" href="/register">注册</a>
                <a class="btn primary" th:if="${user != null}" href="/home">进入主页</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
