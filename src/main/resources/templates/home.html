<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - TeachingPlatform</title>
    <link rel="stylesheet" th:href="@{/css/cyberpunk.css}">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">TeachingPlatform</div>
        <nav class="sidebar-nav">
            <a href="/home" class="active">主页</a>
            <th:block th:if="${user != null and user.role == 'student'}">
                <a href="/student/course/my">我的课程</a>
                <a href="/student/course/selection">选课中心</a>
                <a href="/student/logs">选课记录</a>
                <a href="/student/ai">AI 答疑</a>
            </th:block>
            <th:block th:if="${user != null and user.role == 'teacher'}">
                <a href="/teacher/course/manage">课程管理</a>
                <a href="/teacher/task/manage">作业管理</a>
                <a href="/teacher/score/statistics">成绩统计</a>
                <a href="/teacher/ai">AI 答疑</a>
            </th:block>
        </nav>
        <div class="sidebar-user">
            <strong th:if="${user != null}">你好，<span th:text="${user.username}">user</span></strong>
            <a th:if="${user != null}" class="btn" href="/profile">个人信息</a>
            <a th:if="${user != null}" class="btn danger" href="/logout">退出</a>
            <a th:if="${user == null}" class="btn" href="/login">登录</a>
        </div>
    </aside>
    <main class="main-area">
        <header class="topbar">
            <h1>平台主页</h1>
        </header>
        <section class="hero-band">
            <h2>大模型赋能的智能化教学与实验环境</h2>
        </section>
        <section class="content">
            <div class="toolbar">
                <a th:if="${user != null and user.role == 'student'}" class="btn primary" href="/student/course/selection">去选课</a>
                <a th:if="${user != null and user.role == 'teacher'}" class="btn primary" href="/teacher/course/create">创建课程</a>
                <a th:if="${user != null}" class="btn green" th:href="${user.role == 'teacher' ? '/teacher/ai' : '/student/ai'}">AI 答疑</a>
            </div>
            <h2 th:text="${user != null and user.role == 'teacher' ? '我创建的课程' : '我的课程'}">我的课程</h2>
            <div class="course-grid" th:if="${!#lists.isEmpty(courses)}">
                <article class="item-card" th:each="course : ${courses}">
                    <span class="status-badge" th:text="${course.status}">进行中</span>
                    <h3 th:text="${course.courseName}">课程名称</h3>
                    <p class="muted">编号：<span th:text="${course.courseCode}">CODE</span> ｜ 学分：<span th:text="${course.credit}">0</span></p>
                    <p th:text="${course.description ?: '暂无课程简介'}">课程简介</p>
                    <div class="card-actions">
                        <a th:if="${user != null and user.role == 'teacher'}" class="btn" th:href="@{/teacher/course/manage(courseId=${course.courseId})}">管理课程</a>
                        <a th:if="${user != null and user.role == 'student'}" class="btn" th:href="@{/student/course/detail/{id}(id=${course.courseId})}">进入课程</a>
                    </div>
                </article>
            </div>
            <div class="empty" th:if="${#lists.isEmpty(courses)}">暂无课程数据。</div>
        </section>
    </main>
</div>
</body>
</html>
